<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Admin Chat Dashboard | AJPLUS</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="admin-panel">
    <div class="sidebar">
        <h3>Wateja Walio Online</h3>
        <ul id="user-list"></ul>
    </div>
    
    <div class="chat-area">
        <div id="active-user-name">Chagua mteja kuanza chat</div>
        <div id="admin-messages" class="messages-box"></div>
        <div class="input-box">
            <input type="text" id="adminInput" placeholder="Andika jibu...">
            <button onclick="sendReply()">Tuma</button>
        </div>
    </div>
</div>

<script>
    // 1. Paste zile Config zako hapa (Zilizopo kwenye Screenshot yako)
    const firebaseConfig = {
        apiKey: "AIzaSyDlZldqAnieuNBnkAltj3pvPGQ7fwijadA",
        authDomain: "ajplus-security.firebaseapp.com",
        databaseURL: "https://ajplus-security-default-rtdb.firebaseio.com", // Hakikisha hii ipo
        projectId: "ajplus-security",
        storageBucket: "ajplus-security.appspot.com",
        messagingSenderId: "948708152932",
        appId: "1:948708152932:web:1791cc6f4beccfbfd17171"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let currentChatUser = "";

    // 2. Vuta orodha ya meseji (na kutambua wateja)
    database.ref("chats").on("value", (snapshot) => {
        const userList = document.getElementById('user-list');
        userList.innerHTML = "";
        snapshot.forEach((childSnapshot) => {
            const userId = childSnapshot.key;
            userList.innerHTML += `<li onclick="loadChat('${userId}')">${userId}</li>`;
        });
    });

    // 3. Fungua chat ya mteja maalum
    function loadChat(userId) {
        currentChatUser = userId;
        document.getElementById('active-user-name').innerText = "Unachat na: " + userId;
        
        database.ref("chats/" + userId).on("value", (snapshot) => {
            const msgBox = document.getElementById('admin-messages');
            msgBox.innerHTML = "";
            snapshot.forEach((msg) => {
                const data = msg.val();
                const align = data.sender === "Admin" ? "text-align:right; color:blue;" : "text-align:left;";
                msgBox.innerHTML += `<p style="${align}"><strong>${data.sender}:</strong> ${data.text}</p>`;
            });
        });
    }

    // 4. Tuma Jibu
    function sendReply() {
        const input = document.getElementById('adminInput');
        if (currentChatUser && input.value !== "") {
            database.ref("chats/" + currentChatUser).push({
                sender: "Admin",
                text: input.value,
                timestamp: Date.now()
            });
            input.value = "";
        }
    }
</script>

<style>
    body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
    .admin-panel { display: flex; width: 100%; }
    .sidebar { width: 250px; background: #1e293b; color: white; padding: 20px; }
    .sidebar li { cursor: pointer; padding: 10px; border-bottom: 1px solid #334155; list-style: none; }
    .chat-area { flex: 1; display: flex; flex-direction: column; padding: 20px; }
    .messages-box { flex: 1; border: 1px solid #ddd; overflow-y: auto; padding: 15px; margin-bottom: 10px; }
    .input-box { display: flex; gap: 10px; }
    input { flex: 1; padding: 10px; }
    button { padding: 10px 20px; background: #38bdf8; border: none; color: white; cursor: pointer; }
</style>

</body>
</html>
