<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJPLUS — Setup Owner (Tumia Mara Moja Tu)</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Segoe UI',sans-serif;
  background:#0c0a16;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.card{
  background:white;border-radius:16px;
  padding:36px 32px;width:100%;max-width:480px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.warn{
  background:#fff3cd;border:2px solid #f59e0b;
  border-radius:10px;padding:14px 16px;
  margin-bottom:24px;font-size:13px;
  color:#92400e;line-height:1.6;
}
.warn strong{display:block;font-size:14px;margin-bottom:4px;}
h1{font-size:20px;font-weight:800;color:#1e1b2e;margin-bottom:6px;}
p{font-size:13px;color:#64748b;margin-bottom:24px;}

.form-group{margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.5px;color:#64748b;margin-bottom:6px;}
input{
  width:100%;padding:11px 13px;
  border:1.5px solid #e2e8f0;border-radius:9px;
  font-family:'Segoe UI',sans-serif;font-size:14px;
  color:#1e293b;outline:none;
  transition:border-color 0.2s;
}
input:focus{border-color:#7c3aed;}

.btn{
  width:100%;padding:13px;
  background:#7c3aed;color:white;
  border:none;border-radius:9px;
  font-size:15px;font-weight:800;
  cursor:pointer;transition:all 0.2s;
  margin-top:8px;
}
.btn:hover:not(:disabled){background:#5b21b6;transform:translateY(-1px);}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.result{
  margin-top:18px;padding:14px 16px;
  border-radius:9px;font-size:13px;
  font-weight:600;display:none;line-height:1.6;
}
.result.success{background:rgba(16,185,129,0.1);border-left:4px solid #10b981;color:#065f46;display:block;}
.result.error{background:rgba(232,58,58,0.1);border-left:4px solid #e83a3a;color:#b92929;display:block;}

.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;
  border-radius:50%;animation:spin 0.7s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="card">

  <div class="warn">
    <strong>⚠️ FAILI HII NI YA KUTUMIA MARA MOJA TU!</strong>
    Hii inaunda akaunti ya OWNER (mwongozaji mkuu) yenye ufikiaji wa juu zaidi.
    Baada ya kutumia, <strong>FUTA faili hii</strong> kutoka GitHub na kompyuta yako.
  </div>

  <h1>👑 Tengeneza Owner Account</h1>
  <p>Hii itaunda akaunti mpya ya Firebase Auth + kuiweka role ya "owner" kwenye database.</p>

  <div class="form-group">
    <label>Jina Kamili</label>
    <input type="text" id="ownerName" placeholder="Mfano: John Mfoi" value="">
  </div>

  <div class="form-group">
    <label>Email ya Owner</label>
    <input type="email" id="ownerEmail" placeholder="owner@ajplus.co.tz">
  </div>

  <div class="form-group">
    <label>Password (angalau herufi 6)</label>
    <input type="password" id="ownerPassword" placeholder="Weka password salama">
  </div>

  <button class="btn" id="setupBtn" onclick="setupOwner()">
    🚀 Tengeneza Owner Account
  </button>

  <div class="result" id="resultBox"></div>

</div>

<script src="firebase-config.js"></script>
<script>
function showResult(msg, type) {
  const el = document.getElementById('resultBox');
  el.innerHTML = msg;
  el.className = 'result ' + type;
}

async function setupOwner() {
  const name     = document.getElementById('ownerName').value.trim() || 'AJPLUS Owner';
  const email    = document.getElementById('ownerEmail').value.trim();
  const password = document.getElementById('ownerPassword').value.trim();

  if (!email)    { showResult('❌ Weka email.', 'error'); return; }
  if (!password || password.length < 6) { showResult('❌ Password angalau herufi 6.', 'error'); return; }

  const btn = document.getElementById('setupBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Inafanya kazi...';
  showResult('', '');

  try {
    const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
    const uid = cred.user.uid;

    const ownerData = {
      uid, name, email,
      role: 'owner',
      status: 'active',
      createdAt: Date.now(),
    };

    await firebase.database().ref('users/' + uid).set(ownerData);

    showResult(
      `✅ <strong>Owner ametengenezwa vizuri!</strong><br><br>
       📧 Email: <strong>${email}</strong><br>
       🆔 UID: <strong>${uid}</strong><br>
       👑 Role: <strong>owner</strong><br><br>
       <strong>Sasa unaweza:</strong><br>
       1. Funga faili hii (setup-owner.html) — IFUTE kutoka GitHub!<br>
       2. Nenda kwenye <a href="owner.html" style="color:#065f46;font-weight:700;">Owner Command Center</a><br>
       3. Ingiza email na password yako — utaingia dashboard!`,
      'success'
    );
  } catch(err) {
    const msgs = {
      'auth/email-already-in-use': 'Email hii tayari imetumika kwenye Firebase Auth.',
      'auth/invalid-email': 'Email si sahihi.',
      'auth/weak-password': 'Password ni dhaifu sana.',
    };
    showResult(`❌ ${msgs[err.code] || err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 Tengeneza Owner Account';
  }
}
</script>
</body>
</html>
